x-airflow-common: &airflow-common
  build: .
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@postgres/airflow
    AIRFLOW__CELERY__BROKER_URL: redis://:@redis:6379/0
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-}
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY:-change-me-in-production}
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_SECRET_KEY:-change-me-in-production}
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-api-server:8080/execution
    DATABASE_URL: postgresql://pipeline:${PIPELINE_DB_PASSWORD:-pipeline}@postgres/marketing_pipeline
    # Meta Ads
    META_APP_ID: ${META_APP_ID:-}
    META_APP_SECRET: ${META_APP_SECRET:-}
    META_ACCESS_TOKEN: ${META_ACCESS_TOKEN:-}
    # Google Ads
    GOOGLE_DEVELOPER_TOKEN: ${GOOGLE_DEVELOPER_TOKEN:-}
    GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    GOOGLE_REFRESH_TOKEN: ${GOOGLE_REFRESH_TOKEN:-}
    GOOGLE_LOGIN_CUSTOMER_ID: ${GOOGLE_LOGIN_CUSTOMER_ID:-}
  volumes:
    - ./dags:/opt/airflow/dags
    - ./src:/opt/pipeline/src
    - ./sql:/opt/pipeline/sql
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    environment:
      <<: *airflow-env
      AIRFLOW_ADMIN_USERNAME: ${AIRFLOW_ADMIN_USERNAME:-admin}
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-admin}
      AIRFLOW_ADMIN_EMAIL: ${AIRFLOW_ADMIN_EMAIL:-admin@example.com}
    command:
      - -c
      - |
        PGPASSWORD=airflow psql -h postgres -U airflow -c "CREATE DATABASE marketing_pipeline;" || true
        PGPASSWORD=airflow psql -h postgres -U airflow -c "CREATE USER pipeline WITH PASSWORD '${PIPELINE_DB_PASSWORD:-pipeline}';" || true
        PGPASSWORD=airflow psql -h postgres -U airflow -c "GRANT ALL PRIVILEGES ON DATABASE marketing_pipeline TO pipeline;" || true
        airflow db migrate
        python -c "
        from sqlalchemy import create_engine, text
        import os
        engine = create_engine(os.environ['AIRFLOW__DATABASE__SQL_ALCHEMY_CONN'])
        with engine.begin() as conn:
            conn.execute(text('''
                CREATE TABLE IF NOT EXISTS session (
                    id INTEGER PRIMARY KEY GENERATED ALWAYS AS IDENTITY,
                    session_id VARCHAR(255) UNIQUE,
                    data BYTEA,
                    expiry TIMESTAMP
                )
            '''))
        "
        airflow users create \
          --username "$${AIRFLOW_ADMIN_USERNAME}" \
          --password "$${AIRFLOW_ADMIN_PASSWORD}" \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email "$${AIRFLOW_ADMIN_EMAIL}"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  airflow-api-server:
    <<: *airflow-common
    command: airflow api-server
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/v2/monitor/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  airflow-dag-processor:
    <<: *airflow-common
    command: airflow dag-processor
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    command: airflow scheduler
    restart: unless-stopped

  airflow-worker:
    <<: *airflow-common
    command: airflow celery worker
    restart: unless-stopped

volumes:
  postgres-data:
