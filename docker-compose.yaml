x-airflow-env: &airflow-env
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__CORE__LOAD_EXAMPLES: "False"
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD obrigatório}@postgres:5432/airflow
  AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:?AIRFLOW_FERNET_KEY obrigatório}
  AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
  AIRFLOW_CONN_POSTGRES_MARKETING: postgresql://airflow:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD obrigatório}@postgres:5432/marketing
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  POSTGRES_USER: airflow
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD obrigatório}
  POSTGRES_DB: marketing
  DBT_PROJECT_DIR: /opt/airflow/dbt_project
  DBT_PROFILES_DIR: /opt/airflow/dbt_project
  PYTHONPATH: /opt/airflow
  META_APP_ID: ${META_APP_ID:-}
  META_APP_SECRET: ${META_APP_SECRET:-}
  META_ACCESS_TOKEN: ${META_ACCESS_TOKEN:-}
  GOOGLE_DEVELOPER_TOKEN: ${GOOGLE_DEVELOPER_TOKEN:-}
  GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
  GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
  GOOGLE_REFRESH_TOKEN: ${GOOGLE_REFRESH_TOKEN:-}
  GOOGLE_LOGIN_CUSTOMER_ID: ${GOOGLE_LOGIN_CUSTOMER_ID:-}
  DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
  AIRFLOW_ADMIN_USER: ${AIRFLOW_ADMIN_USER:?AIRFLOW_ADMIN_USER obrigatório}
  AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:?AIRFLOW_ADMIN_PASSWORD obrigatório}
  AIRFLOW_ADMIN_EMAIL: ${AIRFLOW_ADMIN_EMAIL:-admin@example.com}

x-airflow-volumes: &airflow-volumes
  - ./dags:/opt/airflow/dags
  - ./src:/opt/airflow/src
  - ./dbt_project:/opt/airflow/dbt_project
  - airflow-logs:/opt/airflow/logs

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD obrigatório}
      POSTGRES_DB: airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5

  airflow-init:
    build: .
    environment: *airflow-env
    volumes: *airflow-volumes
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint:
      - bash
      - -c
      - |
        set -e
        PGPASSWORD=$$POSTGRES_PASSWORD createdb -h postgres -U airflow marketing 2>/dev/null || true
        airflow db migrate
        airflow users create --username "$$AIRFLOW_ADMIN_USER" --password "$$AIRFLOW_ADMIN_PASSWORD" --firstname admin --lastname admin --role Admin --email "$${AIRFLOW_ADMIN_EMAIL:-admin@example.com}" || true
        cd "$$DBT_PROJECT_DIR" && DBT_LOG_PATH=/tmp/dbt-logs dbt deps --no-version-check
    restart: "no"

  airflow:
    build: .
    command: bash -c "airflow scheduler & airflow webserver"
    environment: *airflow-env
    volumes: *airflow-volumes
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  api:
    build: .
    entrypoint: ["uvicorn", "src.api:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD obrigatório}
      POSTGRES_DB: marketing
      API_KEY_PEPPER: ${API_KEY_PEPPER:?API_KEY_PEPPER obrigatório}
      PYTHONPATH: /opt/airflow
    volumes:
      - ./src:/opt/airflow/src
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\")'"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  postgres-data:
  airflow-logs:
