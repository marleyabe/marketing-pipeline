version: 2

models:
  - name: google_ads
    description: "Silver — google ads dedup + agregação por device/dia."
    columns:
      - name: account_id
        tests: [not_null]
      - name: campaign_id
        tests: [not_null]
      - name: date
        tests: [not_null]
      - name: platform
        tests:
          - not_null
          - accepted_values:
              values: ['google_ads']
      - name: impressions
        tests: [not_null]
      - name: clicks
        tests: [not_null]
      - name: spend
        tests: [not_null]

  - name: meta_ads
    description: "Silver — meta ads dedup por (account, ad, device, publisher, date)."
    columns:
      - name: account_id
        tests: [not_null]
      - name: ad_id
        tests: [not_null]
      - name: campaign_id
        tests: [not_null]
      - name: date
        tests: [not_null]
      - name: platform
        tests:
          - not_null
          - accepted_values:
              values: ['meta_ads']
      - name: impressions
        tests: [not_null]
      - name: clicks
        tests: [not_null]
      - name: spend
        tests: [not_null]

  - name: unified_campaigns
    description: "Silver — unificação google + meta por campaign/dia."
    columns:
      - name: account_id
        tests: [not_null]
      - name: campaign_id
        tests: [not_null]
      - name: date
        tests: [not_null]
      - name: platform
        tests:
          - not_null
          - accepted_values:
              values: ['google_ads', 'meta_ads']

  - name: google_ads_keywords_dedup
    description: "Silver — google ads dedup mantendo granularidade de keyword/dia."
    columns:
      - name: account_id
        tests: [not_null]
      - name: keyword_id
        tests: [not_null]
      - name: keyword_text
        tests: [not_null]
      - name: date
        tests: [not_null]
      - name: platform
        tests:
          - not_null
          - accepted_values:
              values: ['google_ads']

  - name: google_search_terms_dedup
    description: "Silver — search_term_view dedup por (date, ad_group, search_term, matched_keyword)."
    columns:
      - name: account_id
        tests: [not_null]
      - name: search_term
        tests: [not_null]
      - name: date
        tests: [not_null]

  - name: google_negatives_dedup
    description: "Silver — snapshot diário de palavras-chave negativas (campaign+ad_group scope)."
    columns:
      - name: account_id
        tests: [not_null]
      - name: criterion_id
        tests: [not_null]
      - name: scope
        tests:
          - not_null
          - accepted_values:
              values: ['campaign', 'ad_group']
      - name: snapshot_date
        tests: [not_null]
