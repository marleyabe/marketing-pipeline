version: 2

models:
  - name: daily_performance
    description: "Gold — métricas diárias por account + platform com derivadas (ctr/cpc/conv)."
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [account_id, date, platform]
    columns:
      - name: account_id
        tests: [not_null]
      - name: date
        tests: [not_null]
      - name: platform
        tests:
          - not_null
          - accepted_values:
              values: ['google_ads', 'meta_ads']
      - name: impressions
        tests: [not_null]
      - name: spend
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"

  - name: weekly_performance
    description: "Gold — agregação semanal por account + platform."
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [account_id, week_start, platform]
    columns:
      - name: account_id
        tests: [not_null]
      - name: week_start
        tests: [not_null]
      - name: platform
        tests:
          - not_null
          - accepted_values:
              values: ['google_ads', 'meta_ads']
      - name: spend
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"

  - name: google_ads_keywords
    description: "Gold — keywords por account/dia (RN14: HAVING spend > 0)."
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [account_id, keyword_text, ad_group_name, campaign_name, date]
    columns:
      - name: account_id
        tests: [not_null]
      - name: keyword_text
        tests: [not_null]
      - name: date
        tests: [not_null]
      - name: spend
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "> 0"

  - name: google_search_terms
    description: "Gold — search terms reais por account/ad_group/dia (HAVING spend > 0)."
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [account_id, ad_group_name, search_term, matched_keyword_text, matched_keyword_match_type, date]
    columns:
      - name: account_id
        tests: [not_null]
      - name: search_term
        tests: [not_null]
      - name: date
        tests: [not_null]
      - name: spend
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "> 0"

  - name: google_negatives
    description: "Gold — snapshot mais recente de negativas por account/scope."
    columns:
      - name: account_id
        tests: [not_null]
      - name: criterion_id
        tests: [not_null]
      - name: scope
        tests:
          - not_null
          - accepted_values:
              values: ['campaign', 'ad_group']

  - name: budget_pacing
    description: "Gold — spend mês-corrente vs monthly_budget cadastrado (view)."
    columns:
      - name: account_id
        tests: [not_null]
      - name: platform
        tests:
          - not_null
          - accepted_values:
              values: ['google_ads', 'meta_ads']
      - name: pace_flag
        tests:
          - not_null
          - accepted_values:
              values: ['over', 'under', 'on_track', 'unknown']
