services:
  airflow:
    ports: !reset []
    expose:
      - "8080"
    networks:
      - default
      - caddy-net

  api:
    ports: !reset []
    expose:
      - "8000"
    networks:
      - default
      - caddy-net

  postgres-backup:
    build: ./deploy/backup
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD obrigatório}
    volumes:
      - ./backups:/backups
    depends_on:
      postgres:
        condition: service_healthy

networks:
  caddy-net:
    external: true
